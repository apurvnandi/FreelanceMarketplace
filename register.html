<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="form-bg">

<div class="form-box">

<h2>Register</h2>

<input id="regName" type="text" placeholder="Enter Name">

<input id="regEmail" type="email" placeholder="Enter Email">

<input id="regPassword" type="password" placeholder="Enter Password">

<select id="regRole">
<option value="freelancer">Freelancer</option>
<option value="client">Client</option>
</select>

<button onclick="registerUser()">Register</button>

<p>Already have account? <a href="login.html">Login</a></p>

</div>

<script src="js/script.js"></script>

</body>
</html>
